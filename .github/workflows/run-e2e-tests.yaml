name: Run E2E Tests

on: [pull_request]

jobs:
  run-e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest

    services:
      reps-backend-postgres:
        image: bitnami/postgresql
        ports:
          - 5480:5432
        env:
          POSTGRESQL_USERNAME: docker
          POSTGRESQL_PASSWORD: docker
          POSTGRESQL_DATABASE: apisolid

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci
        env:
          SECRET_KEY: testing-secret
          DATABASE_URL: "postgresql://docker:docker@localhost:5480/apisolid?schema=public"
      - run: npm run test:e2e
        env:
          SECRET_KEY: testing-secret
          DATABASE_URL: "postgresql://docker:docker@localhost:5480/apisolid?schema=public"
